name: Generate Carousel (SD)

concurrency:
  group: generate-${{ github.event.inputs.topic }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topik carousel"
        required: true
        type: string
      num_facts:
        description: "Jumlah fakta"
        required: false
        default: "8"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache SD model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: sd-model-v1-5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-nunito fonts-noto-color-emoji 2>/dev/null || true
          pip install -r requirements.txt
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate pillow

      - name: Cleanup old slides for this slug
        run: |
          SLUG=$(echo "${{ inputs.topic }}" | tr '[:upper:]' '[:lower:]' | tr ' -' '_' | sed 's/[^a-z0-9_]//g' | cut -c1-30 | sed 's/_*$//')
          echo "Cleaning old slides for slug: $SLUG"
          rm -f resource/photos/${SLUG}_sd_*
          rm -f resource/photos/${SLUG}_slide_*
          echo "Done"

      - name: Generate carousel
        run: python main.py generate-carousel-sd "${{ inputs.topic }}" --num-facts ${{ inputs.num_facts }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.BACKUP_GEMINI_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      - name: Compress slides
        run: python main.py compress-slides
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-slides
          path: |
            resource/photos/*_sd_*
            resource/photos/edu_*.json

      - name: Commit generated files
        run: |
          git config user.name "Nix Bot"
          git config user.email "nix@aquarisamatiran.dev"
          git add resource/photos/edu_*.json resource/photos/*_sd_* schedule.json
          git diff --cached --quiet || git commit -m "auto: generated carousel for ${{ inputs.topic }}"
          git push origin main
        shell: bash
