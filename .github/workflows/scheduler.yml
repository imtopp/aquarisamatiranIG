name: Instagram Scheduler

on:
  push:
    paths:
      - 'schedule.json'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_time:
        description: 'Paksa jalan (format: YYYY-MM-DD HH:MM WIB)'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv Pillow

      - name: Jalankan scheduler
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/workflows/runner.py

      - name: Commit update schedule
        run: |
          git config user.name "aquarisamatiran-bot"
          git config user.email "bot@aquarisamatiran"
          git add schedule.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📅 Update schedule status"
          git push
