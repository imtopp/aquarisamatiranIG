name: Clean slides
run-name: Clean ${{ inputs.slug }}

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slide slug (e.g. test_emoji)'
        required: true

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve slug and validate
        id: resolve
        run: |
          python3 .github/workflows/clean_helper.py resolve ${{ inputs.slug }} > /tmp/clean_out.txt
          echo "tag=$(grep '^tag=' /tmp/clean_out.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "status=$(grep '^status=' /tmp/clean_out.txt | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Validate not live
        run: |
          STATUS="${{ steps.resolve.outputs.status }}"
          if [ "$STATUS" = "live" ]; then
            echo "Topic status live - cannot clean published content"
            exit 1
          fi

      - name: Delete slide files
        run: |
          SLUG="${{ inputs.slug }}"
          echo "Mencari file dengan prefix: ${SLUG}"
          find accounts/ -path "*/resource/photos/${SLUG}_sd_*" -delete -print 2>/dev/null || true
          find accounts/ -path "*/resource/photos/${SLUG}_slide_*" -delete -print 2>/dev/null || true
          find accounts/ -path "*/resource/photos/edu_${SLUG}*" -delete -print 2>/dev/null || true

      - name: Clean schedule.json entry
        run: python3 .github/workflows/clean_helper.py clean-schedule ${{ steps.resolve.outputs.tag }}
        shell: bash

      - name: Reset topic in source_of_truth.json
        run: python3 .github/workflows/clean_helper.py reset-topic ${{ steps.resolve.outputs.tag }}
        shell: bash

      - name: Clean .uploaded.json stale entries
        run: python3 .github/workflows/clean_helper.py clean-uploaded ${{ inputs.slug }}
        shell: bash

      - name: Commit and push
        run: |
          git config user.name 'nix-bot'
          git config user.email 'bot@nix.fw'
          git add -A
          if git diff --staged --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'clean: remove ${{ inputs.slug }} slides'
            git push
            echo 'Clean committed and pushed'
          fi
