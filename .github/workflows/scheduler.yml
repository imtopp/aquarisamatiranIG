name: Instagram Scheduler

on:
  schedule:
    # Jadwal posting — WIB = UTC+7
    # Minggu 09:00 WIB = 02:00 UTC
    # Senin 19:00 WIB = 12:00 UTC
    # Rabu 19:00 WIB = 12:00 UTC
    # Jumat 19:00 WIB = 12:00 UTC
    - cron: '0 2 * * 0'    # Minggu 09:00 WIB
    - cron: '0 12 * * 1'   # Senin 19:00 WIB
    - cron: '0 12 * * 3'   # Rabu 19:00 WIB
    - cron: '0 12 * * 5'   # Jumat 19:00 WIB
  workflow_dispatch:  # Bisa dijalanin manual dari GitHub juga
    inputs:
      force_time:
        description: 'Paksa jalan (format: YYYY-MM-DD HH:MM WIB)'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv Pillow

      - name: Jalankan scheduler
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/workflows/runner.py

      - name: Commit update schedule
        run: |
          git config user.name "aquarisamatiran-bot"
          git config user.email "bot@aquarisamatiran"
          git add schedule.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📅 Update schedule status"
          git push
