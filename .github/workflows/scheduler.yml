name: Scheduler — triggered by cron-job.org

on:
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Run scheduler on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /home/topp/projects/aquarisamatiran &&
            echo '🕐 Scheduler triggered by cron-job.org' &&
            .venv/bin/python .github/workflows/runner.py
          "
