name: Sync Slots to cron-job.org

on:
  push:
    branches: [main]
    paths:
      - "slot_config/slots.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Sync to cron-job.org
        run: python main.py sync-slots
        env:
          CRONJOB_TOKEN: ${{ secrets.CRONJOB_TOKEN }}
          GITHUB_PAT: ${{ secrets.PAT }}
