name: Scheduler — triggered by cron-job.org

on:
  workflow_dispatch:

concurrency:
  group: scheduler
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        run: python .github/workflows/runner.py
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.BACKUP_GEMINI_API_KEY }}

      - name: Commit & push scheduler outputs
        if: always()
        run: |
          git config user.name "Nix Bot"
          git config user.email "nix@aquarisamatiran.dev"
          test -d accounts/aquarisamatiran/resource/.scheduler_output/ && git add accounts/aquarisamatiran/resource/.scheduler_output/ || true
          git diff --cached --quiet || git commit -m "auto: scheduler output"
          git push origin main || echo '⚠️  Push failed (may be empty or conflict) — deploy will handle'

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
