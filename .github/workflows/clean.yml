name: Clean slides
run-name: Clean ${{ inputs.slug }}

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slide slug (e.g. test_emoji)'
        required: true

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve slug and validate
        id: resolve
        run: |
          python main.py clean resolve ${{ inputs.slug }} > /tmp/clean_out.txt
          echo "tag=$(grep '^tag=' /tmp/clean_out.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "status=$(grep '^status=' /tmp/clean_out.txt | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Validate not live
        run: |
          STATUS="${{ steps.resolve.outputs.status }}"
          if [ "$STATUS" = "live" ]; then
            echo "Topic status live - cannot clean published content"
            exit 1
          fi

      - name: Delete slide files
        run: python main.py clean delete-files ${{ inputs.slug }}

      - name: Clean schedule.json entry
        run: python main.py clean clean-schedule ${{ steps.resolve.outputs.tag }}

      - name: Reset topic in source_of_truth.json
        run: python main.py clean reset-topic ${{ steps.resolve.outputs.tag }}

      - name: Clean .uploaded.json stale entries
        run: python main.py clean clean-uploaded ${{ inputs.slug }}

      - name: Commit and push
        run: |
          git config user.name 'nix-bot'
          git config user.email 'bot@nix.fw'
          git add -A
          if git diff --staged --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'clean: remove ${{ inputs.slug }} slides'
            git push
            echo 'Clean committed and pushed'
          fi
