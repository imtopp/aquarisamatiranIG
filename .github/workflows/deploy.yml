name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /home/topp/projects/aquarisamatiran &&
            git clean -fd &&
            git pull origin main &&
            .venv/bin/pip install -r requirements.txt 2>/dev/null; 
            # Kill all bot instances, then fresh start
            pkill -f bot/bot.py 2>/dev/null || true;
            sleep 2;
            tmux kill-session -t bot 2>/dev/null || true;
            sleep 1;
            tmux new-session -d -s bot -c /home/topp/projects/aquarisamatiran '.venv/bin/python bot/bot.py';
            # Hapus crontab lama (kalo ada) — skrg pake cron-job.org aja
            crontab -l 2>/dev/null | grep -v runner.py | crontab - 2>/dev/null || true;
            echo '✅ Deploy selesai'
          "
