name: Generate Carousel (SD)

permissions:
  contents: write

concurrency:
  group: generate
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topik carousel"
        required: true
        type: string
      num_facts:
        description: "Jumlah fakta"
        required: false
        default: "8"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync with upstream
        run: git pull --rebase origin main
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache SD model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: sd-model-v1-5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-nunito || true
          sudo apt-get install -y -qq fonts-noto-color-emoji fonts-noto-emoji || true
          # Symlink emoji font to known path for _get_emoji_font()
          sudo find /usr/share/fonts -name "*Emoji*" -o -name "*emoji*" 2>/dev/null | head -5 || true
          if [ -f /usr/share/fonts/truetype/noto/NotoColorEmoji.ttf ]; then \
            echo "NotoColorEmoji found at /usr/share/fonts/truetype/noto/"; \
          elif [ -f /usr/share/fonts/opentype/noto/NotoColorEmoji.ttf ]; then \
            echo "NotoColorEmoji found at /usr/share/fonts/opentype/noto/"; \
          else \
            echo "NotoColorEmoji not in standard paths, scanning..."; \
            find /usr/share/fonts -name "NotoColorEmoji*" -exec echo Found: {} \; ; \
          fi
          pip install -r requirements.txt
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate pillow

      - name: Cleanup temp files
        run: rm -f accounts/aquarisamatiran/resource/photos/temp_*

      - name: Generate carousel
        run: python main.py generate-carousel-sd "$TOPIC" --num-facts "$NUM_FACTS"
        env:
          TOPIC: ${{ inputs.topic }}
          NUM_FACTS: ${{ inputs.num_facts }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.BACKUP_GEMINI_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Compress slides
        run: python main.py compress-slides
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-slides
          path: |
            accounts/aquarisamatiran/resource/photos/*_sd_*
            accounts/aquarisamatiran/resource/photos/edu_*.json

      - name: Commit generated files
        run: |
          git config user.name "Nix Bot"
          git config user.email "nix@aquarisamatiran.dev"
          git add accounts/aquarisamatiran/resource/photos/edu_*.json accounts/aquarisamatiran/resource/photos/*_sd_*
          git diff --cached --quiet || git commit -m "auto: generated carousel"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git remote set-url origin https://x-access-token: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@github.com/imtopp/aquarisamatiranIG.git
          git push origin main
        shell: bash

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.PAGES_PAT }}
        shell: bash
