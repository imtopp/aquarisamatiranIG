name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }} " "
            cd /home/topp/projects/aquarisamatiran &&
            git fetch origin main &&
            git reset --hard origin/main &&
            .venv/bin/pip install -r requirements.txt;
            # Update systemd to use python -m nixfw.bot.bot instead of root bot/bot.py
            sudo sed -i 's|ExecStart=.*|ExecStart=/home/topp/projects/aquarisamatiran/.venv/bin/python -m nixfw.bot.bot|' /etc/systemd/system/aquarisamatiran-bot.service;
            sudo systemctl daemon-reload;
            sudo systemctl restart aquarisamatiran-bot
            echo '✅ Deploy selesai'
          "
